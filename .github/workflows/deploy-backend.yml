name: Deploy Backend (EC2 #2)

on:
  push:
    branches:
      - deploy/aws-backend

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Backend to EC2 #2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACKEND_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/smartrecruit-backend2

            # Sauvegarder le commit avant pull
            BEFORE=$(git rev-parse HEAD)
              # Sauvegarder les fichiers protégés dans un dossier temporaire
            mkdir -p /tmp/aws-protected
            cp Server/src/main/java/ma/xproce/login_test/config/AwsSecretsManagerConfig.java /tmp/aws-protected/
            cp Server/src/main/java/ma/xproce/login_test/config/SecurityConfig.java /tmp/aws-protected/
            cp Server/src/main/java/ma/xproce/login_test/web/CandidatureCandidate_Controller.java /tmp/aws-protected/
            cp Server/src/main/resources/application.properties /tmp/aws-protected/

            # Désactiver temporairement le skip-worktree pour laisser git pull passer
            git update-index --no-skip-worktree \
              Server/src/main/java/ma/xproce/login_test/config/AwsSecretsManagerConfig.java \
              Server/src/main/java/ma/xproce/login_test/config/SecurityConfig.java \
              Server/src/main/java/ma/xproce/login_test/web/CandidatureCandidate_Controller.java \
              Server/src/main/resources/application.properties

            # Restaurer les versions git pour permettre le pull
            git checkout -- \
              Server/src/main/java/ma/xproce/login_test/config/AwsSecretsManagerConfig.java \
              Server/src/main/java/ma/xproce/login_test/config/SecurityConfig.java \
              Server/src/main/java/ma/xproce/login_test/web/CandidatureCandidate_Controller.java \
              Server/src/main/resources/application.properties

            # Récupérer les nouveaux commits
            git pull origin deploy/aws-backend
            
            # Remettre les versions AWS par-dessus ce que git vient de tirer
            cp /tmp/aws-protected/AwsSecretsManagerConfig.java \
              Server/src/main/java/ma/xproce/login_test/config/
            cp /tmp/aws-protected/SecurityConfig.java \
              Server/src/main/java/ma/xproce/login_test/config/
            cp /tmp/aws-protected/CandidatureCandidate_Controller.java \
              Server/src/main/java/ma/xproce/login_test/web/
            cp /tmp/aws-protected/application.properties \
               Server/src/main/resources/

            # Réactiver le skip-worktree
            git update-index --skip-worktree \
              Server/src/main/java/ma/xproce/login_test/config/AwsSecretsManagerConfig.java \
              Server/src/main/java/ma/xproce/login_test/config/SecurityConfig.java \
              Server/src/main/java/ma/xproce/login_test/web/CandidatureCandidate_Controller.java \
              Server/src/main/resources/application.properties

            # Voir ce qui a changé entre avant et après le pull
            CHANGED=$(git diff $BEFORE HEAD --name-only)
            echo "Fichiers modifiés : $CHANGED"

            # Rebuilder selon ce qui a changé
            if echo "$CHANGED" | grep -q "Server/"; then
              echo "→ Rebuild du serveur Spring Boot..."
              docker-compose -f docker-compose.backend.yml up -d --build server
            fi

            if echo "$CHANGED" | grep -q "TextExtraction"; then
              echo "→ Rebuild du service LLM..."
              docker-compose -f docker-compose.backend.yml up -d --build llm
            fi

            docker-compose -f docker-compose.backend.yml ps
