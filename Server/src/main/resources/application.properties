spring.application.name=login_test
# Configuration MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/Smart_recruite
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false

# Port (déjà configuré chez toi)
server.port=8090

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Stockage des fichiers CV
app.upload.cv-dir=uploads/cvs

# Taille maximale des fichiers (5 MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
