
spring.application.name=login_test

# L'URL et le username viennent des variables d'environnement (docker-compose)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
# Le mot de passe est injecté par AwsSecretsManagerConfig au démarrage
spring.datasource.password=${DB_PASSWORD:#{null}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de connexions HikariCP
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# ── Port ──────────────────────────────────────────────────────────────────────
server.port=8090

# ── JWT ───────────────────────────────────────────────────────────────────────
# Injecté via Secrets Manager (AwsSecretsManagerConfig) ou variable d'env
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Active le profil S3 (désactive le stockage local)
app.storage.type=s3
aws.s3.bucket=${AWS_S3_BUCKET}
aws.region=${AWS_REGION:eu-west-1}

# ── AWS Secrets Manager ───────────────────────────────────────────────────────
aws.secretsmanager.db-password-secret=smartrecruit/db_password
aws.secretsmanager.jwt-secret-secret=smartrecruit/jwt_secret

# ── Taille maximale des fichiers ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ── Service IA (LLM) ─────────────────────────────────────────────────────────
app.ai.base-url=${APP_AI_BASE_URL:http://llm:5001}

# ── Actuator (health check pour Docker/ELB) ───────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
