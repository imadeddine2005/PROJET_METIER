version: '3.8'

services:
   server:
      build:
         context: ./Server
         dockerfile: Dockerfile
      image: smartrecruit-server:prod
      container_name: smartrecruit_server
      ports:
         - "8090:8090"
      healthcheck:
          test: ["CMD-SHELL", "curl -sf http://localhost:8090/hello || exit 1"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 60s
      env_file:
        - .env
      environment:
          SPRING_PROFILES_ACTIVE: prod
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      # Le mot de passe est lu depuis AWS Secrets Manager dans l'app (voir AwsSecretsConfig.java)
      # On passe le nom du secret pour que Spring Boot puisse le résoudre
          SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # ── AWS ──────────────────────────────────────────────────────────────
          AWS_REGION: ${AWS_REGION:-eu-west-1}
          AWS_S3_BUCKET: ${AWS_BUCKET_NAME}
           # ── JWT (optionnel si géré via Secrets Manager) ───────────────────────
          JWT_SECRET: ${JWT_SECRET}

      # ── Service LLM ──────────────────────────────────────────────────────
          APP_AI_BASE_URL: http://llm:5001

      # ── JVM tuning pour EC2 ───────────────────────────────────────────────
          JAVA_OPTS: "-Xms256m -Xmx512m"

      depends_on:
        llm:
          condition: service_healthy
      restart: unless-stopped
      networks:
          - smartrecruit_net
   llm:
      build:
         context: ./TextExtraction&LLm
         dockerfile: Dockerfile
      image: smartrecruit-llm:prod
      container_name: smartrecruit_llm
      ports:
        - "5001:5001"
      env_file:
        - .env
      environment:
        GROQ_API_KEY: ${GROQ_API_KEY}
      restart: unless-stopped
      networks:
      - smartrecruit_net


networks:
  smartrecruit_net:
    driver: bridge
