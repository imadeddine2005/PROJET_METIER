version: '3.8'

# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Déploiement AWS
#
# Variables requises (définir dans un fichier .env ou dans AWS Parameter Store) :
#   DB_HOST          → Endpoint RDS MySQL (ex: mydb.xxxx.rds.amazonaws.com)
#   DB_NAME          → Nom de la base (ex: Smart_recruite)
#   DB_USERNAME      → Username RDS
#   DB_PASSWORD      → Password RDS (via Secrets Manager si possible)
#   AWS_REGION       → Région AWS (ex: eu-west-1)
#   AWS_BUCKET_NAME  → Nom du bucket S3 (ex: smartrecruit-cvs-prod)
#   SECRET_NAME      → Nom du secret dans AWS Secrets Manager
#   JWT_SECRET       → Clé JWT (récupérée automatiquement via Secrets Manager)
#   GROQ_API_KEY     → Clé API GROQ pour le service LLM
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Frontend React ──────────────────────────────────────────────────────────
  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8090}
    image: smartrecruit-client:prod
    container_name: smartrecruit_client
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartrecruit_net

  # ── Backend Spring Boot ─────────────────────────────────────────────────────
  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    image: smartrecruit-server:prod
    container_name: smartrecruit_server
    ports:
      - "8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # ── RDS MySQL ────────────────────────────────────────────────────────
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST}:3306/${DB_NAME}?useSSL=true&requireSSL=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      # Le mot de passe est lu depuis AWS Secrets Manager dans l'app (voir AwsSecretsConfig.java)
      # On passe le nom du secret pour que Spring Boot puisse le résoudre
      AWS_SECRET_NAME: ${SECRET_NAME}

      # ── AWS ──────────────────────────────────────────────────────────────
      AWS_REGION: ${AWS_REGION:-eu-west-1}
      AWS_S3_BUCKET: ${AWS_BUCKET_NAME}

      # ── JWT (optionnel si géré via Secrets Manager) ───────────────────────
      JWT_SECRET: ${JWT_SECRET}

      # ── Service LLM ──────────────────────────────────────────────────────
      APP_AI_BASE_URL: http://llm:5001

      # ── JVM tuning pour EC2 ───────────────────────────────────────────────
      JAVA_OPTS: "-Xms256m -Xmx512m"

    depends_on:
      llm:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - smartrecruit_net
    # Si l'EC2 utilise un rôle IAM, pas besoin de credentials ici.
    # Sinon, décommenter et utiliser des credentials limités :
    # volumes:
    #   - ~/.aws:/root/.aws:ro

  # ── Service LLM / Python Flask ──────────────────────────────────────────────
  llm:
    build:
      context: ./TextExtraction&LLm
      dockerfile: Dockerfile
    image: smartrecruit-llm:prod
    container_name: smartrecruit_llm
    ports:
      - "5001:5001"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
    restart: unless-stopped
    networks:
      - smartrecruit_net

networks:
  smartrecruit_net:
    driver: bridge
